<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    margin: 0;
    color: white;
    text-align: center;
}

.container {
    max-width: 700px;
    margin: 30px auto;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
}

h1 { font-size: 2.5rem; }

button {
    padding: 10px 15px;
    margin: 8px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.option {
    display: block;
    width: 100%;
    background: white;
    color: black;
    margin: 8px 0;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="container" id="start">
    <h1>Quiz Hub</h1>
    <p>Select Difficulty</p>
    <button onclick="startQuiz('easy')">Easy</button>
    <button onclick="startQuiz('medium')">Medium</button>
    <button onclick="startQuiz('hard')">Hard</button>
</div>

<div class="container hidden" id="quiz">
    <h3 id="qNo"></h3>
    <h2 id="question"></h2>
    <div id="options"></div>
    <p>⏱ Time: <span id="timer">15</span></p>
    <p>⭐ Score: <span id="score">0</span></p>
</div>

<div class="container hidden" id="result">
    <h2>Final Score: <span id="finalScore"></span></h2>
    <p id="analysis"></p>

    <input id="name" placeholder="Enter name">
    <button onclick="saveScore()">Save</button>

    <h3>🏆 Leaderboard</h3>
    <ul id="leaderboard"></ul>

    <button onclick="location.reload()">Play Again</button>
</div>

<script>
// ---------- QUESTION GENERATOR (200+) ----------
function generateQuestions(level) {
    let qs = [];

    for (let i = 1; i <= 100; i++) {
        qs.push({
            q: `Math: ${i} + ${i} = ?`,
            options: [i, i*2, i+5, i-1],
            answer: i*2
        });
    }

    const gk = [
        "Capital of India?", "Sun rises from?", "Largest ocean?",
        "National animal of India?", "Fastest land animal?"
    ];
    const gkAns = ["Delhi","East","Pacific","Tiger","Cheetah"];

    for (let i = 0; i < 100; i++) {
        let index = i % gk.length;
        qs.push({
            q: gk[index],
            options: ["Delhi","West","Atlantic","Lion","Tiger","Cheetah"],
            answer: gkAns[index]
        });
    }

    // Difficulty filter
    if(level === "easy") return qs.slice(0,120);
    if(level === "medium") return qs.slice(40,180);
    return qs.slice(80,200);
}

// ---------- VARIABLES ----------
let questions = [];
let current = 0;
let score = 0;
let timer;
let timeLeft = 15;

// ---------- START ----------
function startQuiz(level){
    document.getElementById("start").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");

    let all = generateQuestions(level);

    // Random 20 questions
    questions = all.sort(() => 0.5 - Math.random()).slice(0,20);

    loadQuestion();
}

// ---------- LOAD QUESTION ----------
function loadQuestion(){
    clearInterval(timer);
    timeLeft = 15;
    document.getElementById("timer").innerText = timeLeft;

    let q = questions[current];

    document.getElementById("qNo").innerText = `Question ${current+1}/20`;
    document.getElementById("question").innerText = q.q;

    let html = "";
    q.options.forEach(opt=>{
        html += `<button class="option" onclick="check('${opt}')">${opt}</button>`;
    });

    document.getElementById("options").innerHTML = html;

    timer = setInterval(()=>{
        timeLeft--;
        document.getElementById("timer").innerText = timeLeft;
        if(timeLeft === 0) next();
    },1000);
}

// ---------- CHECK ----------
function check(ans){
    if(ans == questions[current].answer){
        score++;
        document.getElementById("score").innerText = score;
    }
    next();
}

// ---------- NEXT ----------
function next(){
    current++;
    if(current < 20){
        loadQuestion();
    } else {
        endQuiz();
    }
}

// ---------- END ----------
function endQuiz(){
    clearInterval(timer);

    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    document.getElementById("finalScore").innerText = score;

    let msg = "";
    if(score >= 18) msg = "🔥 Excellent!";
    else if(score >= 10) msg = "👍 Good!";
    else msg = "😅 Practice more!";

    document.getElementById("analysis").innerText = msg;

    loadLeaderboard();
}

// ---------- LEADERBOARD ----------
function saveScore(){
    let name = document.getElementById("name").value || "Player";
    let data = JSON.parse(localStorage.getItem("quizHub")) || [];

    data.push({name, score});
    data.sort((a,b)=>b.score-a.score);
    data = data.slice(0,5);

    localStorage.setItem("quizHub", JSON.stringify(data));
    loadLeaderboard();
}

function loadLeaderboard(){
    let data = JSON.parse(localStorage.getItem("quizHub")) || [];
    let html = "";

    data.forEach(p=>{
        html += `<li>${p.name} - ${p.score}</li>`;
    });

    document.getElementById("leaderboard").innerHTML = html;
}
</script>

</body>
</html>
